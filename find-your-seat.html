<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Encuentra tu asiento</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Alex+Brush&display=swap" rel="stylesheet">

<style>
  body {
    font-family: Georgia, "Times New Roman", serif;
    background-color: #5d4a3f;
    color: #ffffff;
    margin: 0;
    padding: 0;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
  }

  .container {
    width: 90%;
    max-width: 400px;
    padding: 20px;
  }

  h1 {
    font-size: 28px;
    margin-bottom: 10px;
  }

  p {
    font-family: "Alex Brush", cursive;
    font-size: 34px;
    font-weight: normal;
    margin-bottom: 20px;
    color: #f0e6dc;
    line-height: 1.2;
  }

  input {
    width: 90%;
    padding: 12px;
    font-size: 18px;
    font-family: Georgia, "Times New Roman", serif;
    border: none;
    border-radius: 6px;
    outline: none;
    margin-bottom: 25px;
  }

  .result {
    margin-top: 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .guest-card {
    background-color: rgba(255, 255, 255, 0.08);
    border: 1px solid rgba(255, 255, 255, 0.2);
    border-radius: 12px;
    padding: 16px 20px;
    text-align: left;
    backdrop-filter: blur(2px);
  }

  .guest-name {
    font-size: 20px;
    font-weight: bold;
    margin-bottom: 6px;
    font-family: Georgia, "Times New Roman", serif;
  }

  .guest-table {
    display: inline-block;
    font-size: 15px;
    font-weight: normal;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    background-color: rgba(255, 255, 255, 0.15);
    padding: 4px 10px;
    border-radius: 6px;
    color: #f0e6dc;
  }

  .no-results {
    font-size: 18px;
    font-weight: bold;
    text-align: center;
  }
</style>
</head>

<body>

<div class="container">
  <h1>Encuentra tu asiento</h1>
  <p>Escribe tu nombre</p>

  <input type="text" id="search" placeholder="Tu nombre..." />

  <div class="result" id="result"></div>
</div>

<script>
// Your published CSV link
const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSoMmhwoXzjRBkurJsUYtlBOCd617e094rcsP2MXQUp2IpFMW15xEl_ejIWA94law/pub?output=csv";

let guests = [];

// Remove accents for search
function normalizeText(str) {
  return str.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase();
}

// Fetch CSV and parse
fetch(sheetURL)
  .then(res => res.text())
  .then(text => {
    const lines = text.trim().split("\n");
    lines.slice(1).forEach(line => {
      const parts = line.split(",");
      if (parts.length >= 2) {
        guests.push({
          name: parts[0].replace(/"/g,'').trim(),
          normalizedName: normalizeText(parts[0].replace(/"/g,'').trim()),
          table: parts[1].replace(/"/g,'').trim()
        });
      }
    });
  })
  .catch(err => console.error("Error fetching sheet:", err));

// Search logic
document.getElementById("search").addEventListener("input", function() {
  const query = normalizeText(this.value.trim());
  const resultDiv = document.getElementById("result");
  resultDiv.innerHTML = "";

  if (!query) return;

  const matches = guests.filter(g => g.normalizedName.includes(query));

  if (matches.length > 0) {
    matches.forEach(g => {
      const card = document.createElement("div");
      card.className = "guest-card";
      card.innerHTML = `
        <div class="guest-name">${g.name}</div>
        <div class="guest-table">Mesa ${g.table}</div>
      `;
      resultDiv.appendChild(card);
    });
  } else {
    resultDiv.innerHTML = `<div class="no-results">Nombre no encontrado</div>`;
  }
});
</script>

</body>
</html>
